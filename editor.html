<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Portfolio Editor</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root { color-scheme: light; }
  body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
  /* themed scrollbar to match the site */
  *{scrollbar-width:thin;scrollbar-color:#2170e4 #eef2f7}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-track{background:#eef2f7}
  ::-webkit-scrollbar-thumb{background:#2170e4;border-radius:9999px;border:2px solid #eef2f7}
  ::-webkit-scrollbar-thumb:hover{background:#0058be}
  .field-label{font-size:11px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:#64748b}
  input[type=text], input[type=email], textarea {
    width:100%;border:1px solid #d7dce3;border-radius:8px;padding:8px 10px;font-size:14px;color:#0f172a;background:#fff;
    transition:border-color .15s, box-shadow .15s;
  }
  input:focus, textarea:focus { outline:none;border-color:#0058be;box-shadow:0 0 0 3px rgba(0,88,190,.15) }
  textarea{resize:vertical;min-height:64px}
</style>
</head>
<body class="bg-slate-100 text-slate-900">

<div class="flex flex-col h-screen">
  <!-- Top bar -->
  <header class="flex items-center justify-between gap-4 px-5 h-14 bg-white border-b border-slate-200 shrink-0">
    <div class="flex items-center gap-3">
      <span class="font-bold tracking-tight text-[#0058be]">Portfolio&nbsp;Editor</span>
      <span class="hidden sm:inline text-xs text-slate-400">form editor — edits save to content.json automatically</span>
    </div>
    <div class="flex items-center gap-3">
      <span id="status" class="text-xs text-slate-400">Loading…</span>
      <a href="index.html?edit=1" target="_blank" class="text-xs font-medium text-[#0058be] hover:underline">Edit on page ↗</a>
      <a href="index.html" target="_blank" class="text-xs font-medium text-[#0058be] hover:underline">View site ↗</a>
      <button id="export-btn" class="text-xs font-medium px-3 py-1.5 rounded-md border border-slate-300 hover:bg-slate-50">Export JSON</button>
    </div>
  </header>

  <div class="flex flex-1 min-h-0">
    <!-- Form panel -->
    <aside class="w-full md:w-[420px] shrink-0 overflow-y-auto border-r border-slate-200 bg-white">
      <div id="form" class="p-5 space-y-6"></div>
    </aside>

    <!-- Live preview -->
    <main class="hidden md:flex flex-1 flex-col bg-slate-200 min-w-0">
      <div class="flex items-center gap-2 px-4 h-9 text-xs text-slate-500 bg-slate-100 border-b border-slate-200">
        <span class="w-2.5 h-2.5 rounded-full bg-red-400"></span>
        <span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
        <span class="w-2.5 h-2.5 rounded-full bg-green-400"></span>
        <span class="ml-2">Live preview — index.html</span>
      </div>
      <iframe id="preview" src="index.html" class="flex-1 w-full bg-white"></iframe>
    </main>
  </div>
</div>

<script>
(function () {
  const $ = (s, r) => (r || document).querySelector(s);
  const form = $('#form');
  const statusEl = $('#status');
  const preview = $('#preview');
  let data = null;
  let saveTimer = null;

  // ---------- status helper ----------
  function setStatus(text, color) {
    statusEl.textContent = text;
    statusEl.style.color = color || '#94a3b8';
  }

  // ---------- save (debounced) ----------
  function queueSave() {
    setStatus('Editing…', '#94a3b8');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(save, 500);
  }
  async function save() {
    setStatus('Saving…', '#2170e4');
    try {
      const res = await fetch('/api/save', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data),
      });
      if (!res.ok) throw new Error('save failed');
      setStatus('✓ Saved', '#16a34a');
      refreshPreview();
    } catch (e) {
      setStatus('⚠ Save failed (is server.js running?)', '#dc2626');
    }
  }
  let previewTimer = null;
  function refreshPreview() {
    clearTimeout(previewTimer);
    previewTimer = setTimeout(() => {
      try { preview.contentWindow.location.reload(); } catch (e) { preview.src = 'index.html?t=' + Date.now(); }
    }, 250);
  }

  // ---------- set a value at a dotted path, then save ----------
  function setPath(path, value) {
    const keys = path.split('.');
    let o = data;
    for (let i = 0; i < keys.length - 1; i++) {
      const k = keys[i].match(/^\d+$/) ? Number(keys[i]) : keys[i];
      o = o[k];
    }
    const last = keys[keys.length - 1];
    o[last.match(/^\d+$/) ? Number(last) : last] = value;
    queueSave();
  }
  function getPath(path) {
    return path.split('.').reduce((o, k) => (o == null ? o : o[k]), data);
  }

  // ---------- field builders ----------
  function textField(label, path, opts) {
    opts = opts || {};
    const wrap = document.createElement('label');
    wrap.className = 'block';
    const lab = document.createElement('span');
    lab.className = 'field-label block mb-1';
    lab.textContent = label;
    wrap.appendChild(lab);
    const input = opts.multiline ? document.createElement('textarea') : document.createElement('input');
    if (!opts.multiline) input.type = opts.type || 'text';
    input.value = getPath(path) != null ? getPath(path) : '';
    if (opts.rows && opts.multiline) input.rows = opts.rows;
    input.addEventListener('input', () => setPath(path, input.value));
    wrap.appendChild(input);
    return wrap;
  }

  function imageField(label, path) {
    const wrap = document.createElement('div');
    const lab = document.createElement('span');
    lab.className = 'field-label block mb-1';
    lab.textContent = label;
    wrap.appendChild(lab);

    const row = document.createElement('div');
    row.className = 'flex items-center gap-3';

    const thumb = document.createElement('img');
    thumb.className = 'w-16 h-16 object-cover rounded-md border border-slate-200 bg-slate-50';
    thumb.src = getPath(path) || '';
    thumb.alt = '';
    row.appendChild(thumb);

    const right = document.createElement('div');
    right.className = 'flex-1 min-w-0';

    const name = document.createElement('input');
    name.type = 'text';
    name.value = getPath(path) || '';
    name.className = 'mb-2';
    name.addEventListener('input', () => { setPath(path, name.value); thumb.src = name.value; });
    right.appendChild(name);

    const pick = document.createElement('label');
    pick.className = 'inline-block text-xs font-medium px-3 py-1.5 rounded-md bg-[#0058be] text-white cursor-pointer hover:bg-[#00468f]';
    pick.textContent = 'Upload image';
    const file = document.createElement('input');
    file.type = 'file';
    file.accept = 'image/*';
    file.className = 'hidden';
    file.addEventListener('change', async () => {
      const f = file.files[0];
      if (!f) return;
      setStatus('Uploading…', '#2170e4');
      const dataUrl = await new Promise((resolve) => {
        const fr = new FileReader();
        fr.onload = () => resolve(fr.result);
        fr.readAsDataURL(f);
      });
      try {
        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ filename: f.name, dataUrl }),
        });
        const out = await res.json();
        if (!res.ok || !out.ok) throw new Error(out.error || 'upload failed');
        name.value = out.filename;
        thumb.src = out.filename + '?t=' + Date.now();
        setPath(path, out.filename);
      } catch (e) {
        setStatus('⚠ Upload failed', '#dc2626');
      }
    });
    pick.appendChild(file);
    right.appendChild(pick);

    row.appendChild(right);
    wrap.appendChild(row);
    return wrap;
  }

  function section(title) {
    const h = document.createElement('h2');
    h.className = 'text-sm font-bold text-slate-800 pt-2 pb-1 border-b border-slate-200';
    h.textContent = title;
    return h;
  }
  function group() {
    const d = document.createElement('div');
    d.className = 'space-y-3';
    return d;
  }

  // ---------- repeatable list (services / why points / nav / social) ----------
  function repeatable(opts) {
    // opts: { path, makeItem(itemPath, index)->Node[], blank, addLabel }
    const container = document.createElement('div');
    container.className = 'space-y-3';

    function render() {
      container.innerHTML = '';
      const arr = getPath(opts.path) || [];
      arr.forEach((_, i) => {
        const card = document.createElement('div');
        card.className = 'rounded-lg border border-slate-200 p-3 space-y-2 relative';
        opts.makeItem(opts.path + '.' + i, i).forEach((n) => card.appendChild(n));
        const del = document.createElement('button');
        del.className = 'absolute top-2 right-2 text-xs text-red-500 hover:text-red-700';
        del.textContent = '✕';
        del.title = 'Remove';
        del.addEventListener('click', () => {
          getPath(opts.path).splice(i, 1);
          queueSave();
          render();
        });
        card.appendChild(del);
        container.appendChild(card);
      });
      const add = document.createElement('button');
      add.className = 'text-xs font-medium px-3 py-1.5 rounded-md border border-dashed border-slate-300 text-slate-600 hover:border-[#0058be] hover:text-[#0058be] w-full';
      add.textContent = opts.addLabel || '+ Add';
      add.addEventListener('click', () => {
        getPath(opts.path).push(JSON.parse(JSON.stringify(opts.blank)));
        queueSave();
        render();
      });
      container.appendChild(add);
    }
    render();
    container._render = render;
    return container;
  }

  // ---------- build the whole form ----------
  function build() {
    form.innerHTML = '';

    // META
    form.appendChild(section('Site'));
    const meta = group();
    meta.appendChild(textField('Site name', 'meta.siteName'));
    meta.appendChild(textField('WhatsApp number (intl, digits only)', 'meta.phoneIntl'));
    meta.appendChild(textField('Email', 'meta.email', { type: 'email' }));
    form.appendChild(meta);

    // HERO
    form.appendChild(section('Hero'));
    const hero = group();
    hero.appendChild(textField('Badge', 'hero.badge'));
    hero.appendChild(textField('Heading (lead)', 'hero.headingLead'));
    hero.appendChild(textField('Heading (accent)', 'hero.headingAccent'));
    hero.appendChild(textField('Tagline', 'hero.tagline', { multiline: true, rows: 2 }));
    hero.appendChild(textField('Description', 'hero.description', { multiline: true, rows: 3 }));
    hero.appendChild(textField('Primary button label', 'hero.primaryCtaLabel'));
    hero.appendChild(textField('Secondary button label', 'hero.secondaryCtaLabel'));
    hero.appendChild(imageField('Hero image', 'hero.image'));
    hero.appendChild(textField('Hero image alt text', 'hero.imageAlt'));
    form.appendChild(hero);

    // SERVICES
    form.appendChild(section('Services'));
    const sv = group();
    sv.appendChild(textField('Heading', 'services.heading'));
    sv.appendChild(textField('Subheading', 'services.subheading', { multiline: true, rows: 2 }));
    const svLabel = document.createElement('div');
    svLabel.className = 'field-label';
    svLabel.textContent = 'Service cards';
    sv.appendChild(svLabel);
    sv.appendChild(repeatable({
      path: 'services.items',
      addLabel: '+ Add service',
      blank: { icon: 'star', title: 'New service', description: 'Describe this service.' },
      makeItem: (p) => [
        textField('Icon (Material Symbol name)', p + '.icon'),
        textField('Title', p + '.title'),
        textField('Description', p + '.description', { multiline: true, rows: 2 }),
      ],
    }));
    form.appendChild(sv);

    // ABOUT
    form.appendChild(section('About'));
    const ab = group();
    ab.appendChild(textField('Heading', 'about.heading'));
    ab.appendChild(textField('Lead (highlighted)', 'about.lead', { multiline: true, rows: 3 }));
    ab.appendChild(textField('Body', 'about.body', { multiline: true, rows: 4 }));
    ab.appendChild(imageField('About image', 'about.image'));
    ab.appendChild(textField('About image alt text', 'about.imageAlt'));
    ab.appendChild(textField('"Why" section title', 'about.whyTitle'));
    const whyLabel = document.createElement('div');
    whyLabel.className = 'field-label';
    whyLabel.textContent = 'Why-work-with-me points';
    ab.appendChild(whyLabel);
    ab.appendChild(repeatable({
      path: 'about.whyPoints',
      addLabel: '+ Add point',
      blank: 'New reason',
      makeItem: (p) => [ textField('Point', p) ],
    }));
    form.appendChild(ab);

    // CONTACT
    form.appendChild(section('Contact'));
    const ct = group();
    ct.appendChild(textField('Heading', 'contact.heading'));
    ct.appendChild(textField('Subheading', 'contact.subheading', { multiline: true, rows: 2 }));
    ct.appendChild(textField('WhatsApp label', 'contact.whatsappLabel'));
    ct.appendChild(textField('WhatsApp value (shown)', 'contact.whatsappValue'));
    ct.appendChild(textField('Email label', 'contact.emailLabel'));
    ct.appendChild(textField('Email value (shown)', 'contact.emailValue'));
    ct.appendChild(textField('Location label', 'contact.locationLabel'));
    ct.appendChild(textField('Location value', 'contact.locationValue'));
    ct.appendChild(textField('Submit button label', 'contact.submitLabel'));
    form.appendChild(ct);

    // SOCIAL
    form.appendChild(section('Social links'));
    const so = group();
    so.appendChild(repeatable({
      path: 'social',
      addLabel: '+ Add social link',
      blank: { network: 'Instagram', href: 'https://' },
      makeItem: (p) => [
        textField('Network (Instagram or LinkedIn)', p + '.network'),
        textField('URL', p + '.href'),
      ],
    }));
    form.appendChild(so);

    // NAV
    form.appendChild(section('Navigation'));
    const nv = group();
    nv.appendChild(textField('CTA button label', 'nav.ctaLabel'));
    const navLabel = document.createElement('div');
    navLabel.className = 'field-label';
    navLabel.textContent = 'Nav links';
    nv.appendChild(navLabel);
    nv.appendChild(repeatable({
      path: 'nav.links',
      addLabel: '+ Add link',
      blank: { label: 'New', href: '#' },
      makeItem: (p) => [
        textField('Label', p + '.label'),
        textField('Href (e.g. #about)', p + '.href'),
      ],
    }));
    form.appendChild(nv);
  }

  // ---------- export ----------
  $('#export-btn').addEventListener('click', () => {
    const blob = new Blob([JSON.stringify(data, null, 2) + '\n'], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'content.json';
    a.click();
    URL.revokeObjectURL(a.href);
  });

  // ---------- boot ----------
  fetch('content.json', { cache: 'no-store' })
    .then((r) => { if (!r.ok) throw new Error('content.json not found'); return r.json(); })
    .then((json) => {
      data = json;
      build();
      setStatus('✓ Loaded', '#16a34a');
    })
    .catch((e) => {
      setStatus('⚠ Could not load content.json — run `node server.js`', '#dc2626');
      form.innerHTML = '<div class="text-sm text-red-600 p-3 bg-red-50 rounded-lg border border-red-200">' +
        'Could not load <b>content.json</b>.<br><br>Start the editor with:<br><code class="block mt-1 bg-white px-2 py-1 rounded">node server.js</code><br>then open <b>http://localhost:4321/editor.html</b>.</div>';
    });
})();
</script>
</body>
</html>
